# Orquestando todos los servicios de la aplicación.

services:

  # Servicio de la API
  api:
    build:
      context: ./app        # Busca el Dockerfile dentro de /app
    container_name: tasks-api
    restart: unless-stopped  # Se reinicia solo si cae inesperadamente
    ports:
      - "127.0.0.1:${PORT}:3000"
    environment:             # Variables de entorno desde el archivo .env
      - PORT=${PORT}
      - NODE_ENV=production
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy  # Espera a que PostgreSQL esté listo
    networks:
      - app-network           # Red interna, no expuesta al exterior
    # ── Hardening: privilegios mínimos para limitar el blast radius si la
    # imagen de Node se viera comprometida (cadena de suministro, RCE, etc).
    security_opt:
      - "no-new-privileges:true"   # No puede escalar privilegios via setuid
    cap_drop:
      - ALL                        # Sin capabilities; Node no las necesita
    read_only: true                # FS raíz inmutable; tmpfs para /tmp
    tmpfs:
      - /tmp
    pids_limit: 128                # Limita explosión de procesos (fork bomb)
    mem_limit: 256m                # Acota memoria; OOM antes de tumbar el host

  #Servicio de PostgreSQL
  db:
    # Imagen oficial fijada por digest (reproducibilidad + cadena de suministro).
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: tasks-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data  # Persistencia de datos
    networks:
      - app-network           # Misma red interna que la API
    healthcheck:              # Verifica que PostgreSQL esté listo antes de iniciar la API
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Postgres necesita escribir en /var/lib/postgresql; no podemos read_only.
    # Aplicamos el resto del hardening estándar.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN                   # Postgres setea ownership de su data dir
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
      - FOWNER
    mem_limit: 256m

  caddy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    container_name: tasks-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app-network
    depends_on:
      - api
    # Caddy necesita NET_BIND_SERVICE para 80/443 (no-root) y escribir certs.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 128m

# Volúmenes
# Docker gestiona este volumen. Si el contenedor se destruye, los datos en este volumen sobreviven.
volumes:
  postgres-data:
  caddy-data:
  caddy-config:

#Redes
# Red interna aislada. La BD no es accesible desde internet, solo desde los servicios dentro de esta red.
networks:
  app-network:
    driver: bridge
