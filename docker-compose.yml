# Orquestando todos los servicios de la aplicaciĂłn.

services:

  # Servicio de la API 
  api:
    build:
      context: ./app        # Busca el Dockerfile dentro de /app
    container_name: tasks-api
    restart: unless-stopped  # Se reinicia solo si cae inesperadamente
    ports:
      - "127.0.0.1:${PORT}:3000"
    environment:             # Variables de entorno desde el archivo .env
      - PORT=${PORT}
      - NODE_ENV=production
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy  # Espera a que PostgreSQL estĂ© listo
    networks:
      - app-network           # Red interna, no expuesta al exterior

  #Servicio de PostgreSQL
  db:
    image: postgres:16-alpine  # Imagen oficial, versiĂłn estable y liviana
    container_name: tasks-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data  # Persistencia de datos
    networks:
      - app-network           # Misma red interna que la API
    healthcheck:              # Verifica que PostgreSQL estĂ© listo antes de iniciar la API
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # cAdvisor: mĂ©tricas por contenedor (CPU, memoria, red, I/O)
  # Solo expuesto en loopback; lo raspa Alloy desde el host.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: tasks-cadvisor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - app-network

  caddy:
    image: caddy:2-alpine
    container_name: tasks-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app-network
    depends_on:
      - api

# VolĂşmenes
# Docker gestiona este volumen. Si el contenedor se destruye, los datos en este volumen sobreviven.
volumes:
  postgres-data:
  caddy-data:
  caddy-config:

#Redes 
# Red interna aislada. La BD no es accesible desde internet, solo desde los servicios dentro de esta red.
networks:
  app-network:
    driver: bridge