# ============================================================
# Pipeline de CI/CD para taller-docker-api
# ============================================================
# Se ejecuta automaticamente en cada push al repositorio.
# Valida el codigo y lo despliega al servidor de produccion.
# ============================================================

image: node:20-alpine

variables:
  APP_DIR: app
  IMAGE_NAME: taller-docker-api

stages:
  - install
  - audit
  - lint
  - build
  - deploy

# ------------------------------------------------------------
# JOB: install_dependencies
# ------------------------------------------------------------
install_dependencies:
  stage: install
  script:
    - echo "Instalando dependencias en $APP_DIR..."
    - cd $APP_DIR
    - npm ci
    - echo "Dependencias instaladas correctamente"
  artifacts:
    paths:
      - $APP_DIR/node_modules
    expire_in: 1 hour

# ------------------------------------------------------------
# JOB: security_audit
# ------------------------------------------------------------
security_audit:
  stage: audit
  needs: ["install_dependencies"]
  script:
    - echo "Auditando dependencias de produccion en $APP_DIR..."
    - cd $APP_DIR
    - npm audit --audit-level=high --omit=dev
    - echo "Auditoria completada sin vulnerabilidades altas o criticas"

# ------------------------------------------------------------
# JOB: code_lint
# ------------------------------------------------------------
code_lint:
  stage: lint
  needs: ["install_dependencies"]
  script:
    - echo "Validando codigo con ESLint en $APP_DIR..."
    - cd $APP_DIR
    - npm run lint
    - echo "Codigo cumple con los estandares de calidad"

# ------------------------------------------------------------
# JOB: docker_build
# ------------------------------------------------------------
docker_build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Construyendo imagen Docker desde $APP_DIR/Dockerfile..."
    - cd $APP_DIR
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - echo "Imagen Docker construida exitosamente"
    - docker images $IMAGE_NAME

# ------------------------------------------------------------
# JOB: deploy_to_production
# ------------------------------------------------------------
# Despliega los cambios al servidor de produccion via SSH.
# Solo se ejecuta en la rama 'main' (rama protegida) y solo
# si todos los stages anteriores pasaron correctamente.
#
# Usa Variables Protegidas de GitLab (Settings > CI/CD > Variables):
#   - SSH_PRIVATE_KEY: llave SSH privada (tipo File)
#   - DEPLOY_USER: usuario SSH del servidor
#   - DEPLOY_HOST: IP/hostname del servidor
#
# El servidor debe tener la llave publica correspondiente en
# ~/.ssh/authorized_keys y el repositorio clonado en
# ~/taller-docker-api con remote apuntando a GitLab.
# ------------------------------------------------------------
deploy_to_production:
  stage: deploy
  # Imagen ligera con cliente SSH instalado
  image: alpine:3.19
  # Solo desplegar desde la rama main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    # Instalar dependencias necesarias para SSH
    - apk add --no-cache openssh-client
    # Preparar el directorio SSH y configurar la llave privada
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # Copiar la llave privada al lugar correcto con permisos seguros
    # SSH_PRIVATE_KEY es de tipo File: la variable contiene la RUTA al archivo
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    # Agregar el host del servidor a known_hosts para evitar prompts
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - echo "Desplegando a $DEPLOY_USER@$DEPLOY_HOST..."
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        set -e
        echo '--- Entrando al directorio del proyecto ---'
        cd ~/taller-docker-api
        echo '--- Trayendo cambios desde GitLab ---'
        git pull origin main
        echo '--- Reconstruyendo y reiniciando contenedores ---'
        docker compose down
        docker compose up -d --build
        echo '--- Verificando estado de los contenedores ---'
        docker ps
      "
    - echo "Despliegue completado exitosamente"
