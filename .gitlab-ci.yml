# ============================================================
# Pipeline de CI/CD para taller-docker-api
# ============================================================
# Se ejecuta automaticamente en cada push al repositorio.
# Valida el codigo y (mas adelante) lo despliega al servidor.
# ============================================================

image: node:20-alpine

variables:
  APP_DIR: app

stages:
  - install
  - audit
  - lint

# ------------------------------------------------------------
# JOB: install_dependencies
# ------------------------------------------------------------
install_dependencies:
  stage: install
  script:
    - echo "Instalando dependencias en $APP_DIR..."
    - cd $APP_DIR
    - npm ci
    - echo "Dependencias instaladas correctamente"
  artifacts:
    paths:
      - $APP_DIR/node_modules
    expire_in: 1 hour

# ------------------------------------------------------------
# JOB: security_audit
# ------------------------------------------------------------
security_audit:
  stage: audit
  needs: ["install_dependencies"]
  script:
    - echo "Auditando dependencias de produccion en $APP_DIR..."
    - cd $APP_DIR
    - npm audit --audit-level=high --omit=dev
    - echo "Auditoria completada sin vulnerabilidades altas o criticas"

# ------------------------------------------------------------
# JOB: code_lint
# ------------------------------------------------------------
# Valida el estilo y calidad del codigo JavaScript usando ESLint.
# Detecta errores de sintaxis, variables sin usar, comparaciones
# con == en vez de ===, comillas inconsistentes, etc.
# ------------------------------------------------------------
code_lint:
  stage: lint
  needs: ["install_dependencies"]
  script:
    - echo "Validando codigo con ESLint en $APP_DIR..."
    - cd $APP_DIR
    - npm run lint
    - echo "Codigo cumple con los estandares de calidad"
